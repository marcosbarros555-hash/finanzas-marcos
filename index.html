<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#2c3e7a" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#171a23" media="(prefers-color-scheme: dark)" />
  <title>Finanzas · Marcos</title>
  <link rel="stylesheet" href="css/styles.css" />

  <!-- App instalable (PWA) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
</head>
<body>
  <div id="app" aria-live="polite">
    <div class="pantalla-carga"><div class="spinner"></div></div>
  </div>
  <div id="toast" class="toast" role="status"></div>

  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
